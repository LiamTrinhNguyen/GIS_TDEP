<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding -->
  <meta charset="UTF-8" />
  
  <!-- Responsive design for mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Browser tab title -->
  <title>MAP ACTIVE - SIMULATION RUNNING</title>

  <!-- PyScript CSS -->
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.11.1/core.css" />
  
  <!-- PyScript engine -->
  <script type="module" src="https://pyscript.net/releases/2024.11.1/core.js"></script>

  <!-- Leaflet CSS (for the interactive map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* Reset default styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Main page style - pure black & white */
    body {
      background: #000000;
      color: #FFFFFF;
      font-family: 'Consolas', 'Courier New', monospace;
      min-height: 100vh;
    }

    /* Terminal-style container */
    .crt {
      background: #000000;
      box-shadow: inset 0 0 40px #222222;
      padding: 18px;
      min-height: 100vh;
    }

    /* Header section */
    .header {
      text-align: center;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 22px;
      letter-spacing: 2px;
      color: #FFFFFF;
    }

    .subtitle {
      color: #AAAAAA;
      font-size: 13px;
      margin-top: 4px;
    }

    /* Toolbar buttons */
    .toolbar {
      text-align: center;
      margin: 12px 0;
    }

    button {
      background: #111111;
      color: #FFFFFF;
      border: 1px solid #FFFFFF;
      padding: 6px 14px;
      margin: 0 4px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #333333;
      box-shadow: 0 0 8px #FFFFFF;
    }

    /* Main layout - 3 columns */
    .main {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    /* Drawing canvas */
    canvas {
      background: #000000;
      border: 1px solid #FFFFFF;
      image-rendering: pixelated;
    }

    /* Console panel */
    .console {
      width: 340px;
      background: #0A0A0A;
      border: 1px solid #FFFFFF;
      padding: 12px;
    }

    textarea {
      width: 100%;
      height: 240px;
      background: #000000;
      color: #FFFFFF;
      border: 1px solid #555555;
      font-family: inherit;
      font-size: 13px;
      padding: 8px;
      resize: vertical;
    }

    .examples {
      margin: 8px 0;
    }

    .examples button {
      font-size: 12px;
      padding: 4px 8px;
    }

    /* Interactive Map Panel */
    .map-panel {
      width: 420px;
      background: #0A0A0A;
      border: 1px solid #FFFFFF;
      padding: 12px;
    }

    .map-title {
      font-size: 14px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    /* The actual map container */
    #map {
      width: 100%;
      height: 380px;
      background: #111111;
      border: 1px solid #555555;
    }

    /* Custom zoom controls style (black & white) */
    .leaflet-control-zoom a {
      background-color: #111111 !important;
      color: #FFFFFF !important;
      border: 1px solid #FFFFFF !important;
    }

    .leaflet-control-zoom a:hover {
      background-color: #333333 !important;
    }
  </style>
</head>

<body>
  <div class="crt">

    <!-- Header -->
    <div class="header">
      <h1>MAP ACTIVE - SIMULATION RUNNING</h1>
      <div class="subtitle">
        Mapping Display · Statistical Information · Trending
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="btn-clear">[ CLEAR ]</button>
      <button id="btn-run">[ RUN ]</button>
    </div>

    <!-- Main content area -->
    <div class="main">

      <!-- 1. FIRST COLUMN: Interactive Map -->
      <div class="map-panel">
        <div class="map-title">MAP VIEW · ZOOM & EXPLORE</div>
        
        <!-- Leaflet map will be created inside this div -->
        <div id="map"></div>
        
        <div style="margin-top: 8px; font-size: 12px; color: #AAAAAA;">
          Scroll to zoom · Drag to pan
        </div>
      </div>

      <!-- 2. SECOND COLUMN: Drawing Canvas -->
      <canvas id="canvas" width="520" height="400"></canvas>

      <!-- 3. THIRD COLUMN: Console -->
      <div class="console">
        <strong>PIPSQUEAK CONSOLE v1.0</strong>

        <div class="examples">
          Examples:
          <button onclick="loadExample('square')">Square</button>
          <button onclick="loadExample('star')">Star</button>
          <button onclick="loadExample('spiral')">Spiral</button>
        </div>

        <textarea id="code">CENTER
REPEAT 4 {
  FORWARD 100
  TURN 90
}</textarea>

        <br><br>
        <button id="btn-run2">[ RUN ]</button>
        <button onclick="document.getElementById('code').value=''">[ CLR ]</button>
      </div>

    </div>
  </div>

  <!-- Load Python modules -->
  <py-config>
    [[fetch]]
    files = [
      "./modules/turtle.py",
      "./modules/parser.py"
    ]
  </py-config>

  <!-- Python logic -->
  <script type="py">
    from modules.parser import run_pipsqueak, init_turtle
    from js import document

    init_turtle()

    def run_code(event=None):
        code = document.getElementById("code").value
        run_pipsqueak(code)

    def clear_canvas(event=None):
        from modules.parser import init_turtle
        t = init_turtle()
        t.clear()

    document.getElementById("btn-run").addEventListener("click", run_code)
    document.getElementById("btn-run2").addEventListener("click", run_code)
    document.getElementById("btn-clear").addEventListener("click", clear_canvas)
  </script>

  <!-- Example loader -->
  <script>
    function loadExample(name) {
      const examples = {
        square: `CENTER
REPEAT 4 {
  FORWARD 100
  TURN 90
}`,
        star: `CENTER
REPEAT 5 {
  FORWARD 120
  TURN 144
}`,
        spiral: `CENTER
REPEAT 80 {
  FORWARD 5
  TURN 15
}`
      };
      document.getElementById("code").value = examples[name] || "";
    }
  </script>

  <!-- Leaflet Map -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Create the map - centered on Madison, WI
    const map = L.map('map', {
      zoomControl: true,
      scrollWheelZoom: true,
      doubleClickZoom: true,
      dragging: true
    }).setView([43.07, -89.40], 7);

    // Clean black & white map style
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap & CartoDB',
      maxZoom: 19,
      minZoom: 3
    }).addTo(map);

    // Example marker
    L.marker([43.07, -89.40])
      .addTo(map)
      .bindPopup('Wisconsin State Laboratory of Hygiene area');
  </script>
</body>
</html>
